<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Mercadería</title>

    <link rel="stylesheet" href="css/style.css?v=5">
</head>

<body>

    <!-- HEADER -->
    <header class="header">

        <div class="logo">
            <img src="assets/logo.png" alt="Logo">
        </div>

        <div class="title-section">
            <h1>Control de Mercadería</h1>
            <p>Seguimiento de envíos desde China</p>
        </div>

    </header>

    <!-- TARJETAS -->
    <section class="cards">

        <div class="card total-card" onclick="filtrarPorEstado('TODOS')">
            <h3>Total</h3>
            <p id="totalCard">0</p>
        </div>

        <div class="card pendiente-card" onclick="filtrarPorEstado('Pendiente')">
            <h3>Pendiente</h3>
            <p id="pendienteCard">0</p>
        </div>

        <div class="card proveedor-card" onclick="filtrarPorEstado('Proveedor')">
            <h3>Proveedor</h3>
            <p id="proveedorCard">0</p>
        </div>

        <div class="card china-card" onclick="filtrarPorEstado('En China')">
            <h3>En China</h3>
            <p id="chinaCard">0</p>
        </div>

        <div class="card transito-card" onclick="filtrarPorEstado('En tránsito')">
            <h3>En tránsito</h3>
            <p id="transitoCard">0</p>
        </div>

        <div class="card miami-card" onclick="filtrarPorEstado('En Miami')">
            <h3>En Miami</h3>
            <p id="miamiCard">0</p>
        </div>

        <div class="card aduana-card" onclick="filtrarPorEstado('En Aduana')">
            <h3>En Aduana</h3>
            <p id="aduanaCard">0</p>
        </div>

        <div class="card entregado-card" onclick="filtrarPorEstado('Entregado')">
            <h3>Entregado</h3>
            <p id="entregadoCard">0</p>
        </div>

    </section>

    <!-- FORMULARIO -->
    <section class="form-section">

        <h2>Nuevo Envío</h2>

        <div class="form-grid">

            <input type="text" id="rastreo" placeholder="Número de rastreo">

            <input type="text" id="contenido" placeholder="Contenido">

            <select id="estado">
                <option>Pendiente</option>
                <option>Proveedor</option>
                <option>En China</option>
                <option>En tránsito</option>
                <option>En Miami</option>
                <option>En Aduana</option>
                <option>Entregado</option>
            </select>

            <input type="date" id="fecha">

            <input type="text" id="proveedor" placeholder="Proveedor">

        </div>

        <textarea id="observaciones" placeholder="Observaciones"></textarea>

        <button id="guardarBtn">Guardar</button>

    </section>

    <!-- DASHBOARD -->
    <section class="dashboard">

        <div class="dashboard-header">

            <h2>Mercadería Registrada</h2>

            <input 
                type="text"
                id="buscador"
                placeholder="Buscar rastreo, contenido o proveedor..."
            >

        </div>

        <table>

            <thead>
                <tr>
                    <th>Rastreo</th>
                    <th>Contenido</th>
                    <th>Estado</th>
                    <th>Fecha</th>
                    <th>Proveedor</th>
                    <th>Acciones</th>
                </tr>
            </thead>

            <tbody id="tablaBody">

            </tbody>

        </table>

    </section>

    <script src="js/app.js?v=5"></script>

</body>
</html>
