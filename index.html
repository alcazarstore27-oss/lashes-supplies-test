<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lashes Supplies Tracking</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">

        <div class="logo">
            <img src="assets/logo.png" alt="Logo">
        </div>

        <div class="title-section">
            <h1>Control de Mercadería</h1>
            <p>Seguimiento de envíos desde China</p>
        </div>

    </header>

    <!-- FORMULARIO -->
    <section class="form-section">

        <h2>Nuevo Envío</h2>

        <div class="form-grid">

            <input type="text" id="rastreo" placeholder="Número de rastreo">

            <input type="text" id="contenido" placeholder="Contenido">

            <select id="estado">
                <option>Pendiente</option>
                <option>Proveedor</option>
                <option>En China</option>
                <option>En tránsito</option>
                <option>En Miami</option>
                <option>En Aduana</option>
                <option>Entregado</option>
            </select>

            <input type="date" id="fecha">

            <input type="text" id="proveedor" placeholder="Proveedor">

        </div>

        <textarea id="observaciones" placeholder="Observaciones"></textarea>

        <button id="guardarBtn">Guardar</button>

    </section>

    <!-- DASHBOARD -->
    <section class="dashboard">

        <h2>Mercadería Registrada</h2>

        <table>

            <thead>
                <tr>
                    <th>Rastreo</th>
                    <th>Contenido</th>
                    <th>Estado</th>
                    <th>Fecha</th>
                    <th>Proveedor</th>
                </tr>
            </thead>

            <tbody id="tablaBody">

            </tbody>

        </table>

    </section>

    <script src="js/app.js"></script>

</body>
</html>
